# Save the output of this file and use kubectl create -f to import
# it into Kubernetes.
#
# Created with podman-5.6.0
apiVersion: v1
kind: Pod
metadata:
  annotations:
    io.podman.annotations.userns: keep-id:uid=54321,gid=54321
  labels:
    app: apex
  name: apex
spec:
  containers:
  - env:
    - name: ORACLE_PWD
      value: $ORASYSPWD
    image: container-registry.oracle.com/database/free:latest
    name: db
    ports:
    - containerPort: 1521
      hostPort: 1521
    - containerPort: 8080
      hostPort: 8080
    - containerPort: 8443
      hostPort: 8443
    - containerPort: 27017
      hostPort: 27017
    securityContext:
      privileged: true
      procMount: Unmasked
    volumeMounts:
    - mountPath: /home/oracle/apex
      name: home-oracle-apex-host-0
    - mountPath: /opt/oracle/oradata
      name: home-oracle-oradata-host-1
  - env:
    - name: ORACLE_PWD
      value: $ORASYSPWD
    - name: DBHOST
      value: localhost
    - name: DBPORT
      value: "1521"
    - name: DBSERVICENAME
      value: freepdb1
    image: container-registry.oracle.com/database/ords:latest
    name: ords
    securityContext:
      privileged: true
      procMount: Unmasked
    volumeMounts:
    - mountPath: /etc/ords/config
      name: home-oracle-ords-config-host-0
    - mountPath: /opt/oracle/apex
      name: home-oracle-apex-host-1
  hostUsers: false
  volumes:
  - hostPath:
      path: /home/oracle/apex
      type: Directory
    name: home-oracle-apex-host-0
  - hostPath:
      path: /home/oracle/oradata
      type: Directory
    name: home-oracle-oradata-host-1
  - hostPath:
      path: /home/oracle/ords_config
      type: Directory
    name: home-oracle-ords-config-host-0
  - hostPath:
      path: /home/oracle/apex
      type: Directory
    name: home-oracle-apex-host-1