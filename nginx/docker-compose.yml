name: ubuntu-oracle-apex
services:
  db26ai:
    container_name: apex-db
    image: container-registry.oracle.com/database/free:latest
    env_file:
      - ./.env
    environment:
      - ORACLE_PDB=FREEPDB1
      - ORACLE_PWD=${ORACLE_PWD}
    ports:
      - 1521:1521
      - 1522:1522
    volumes:
      - /home/oracle/oradata:/opt/oracle/oradata
      - /home/oracle/apex:/home/oracle/apex
    networks:
      - oracle-net

  ords-db26ai:
    container_name: apex-ords
    image: container-registry.oracle.com/database/ords:latest
    env_file:
      - ./.env
    environment:
      - DBSERVICENAME=FREEPDB1
      - DBHOST=apex-db
      - DBPORT=1521
      - ORACLE_PWD=${ORACLE_PWD}
    ports:
      - 8080:8080
      - 8443:8443
      - 27017:27017
    volumes:
      - /home/oracle/ords_config:/etc/ords/config
      - /home/oracle/apex:/opt/oracle/apex
    depends_on:
      db26ai:
        condition: service_healthy
    networks:
      - oracle-net

networks:
  oracle-net:
    driver: bridge