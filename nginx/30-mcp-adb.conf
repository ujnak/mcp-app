######################################################################################
# Set endpoint URL of Autonomous AI Database to "ords_upstream_host"
######################################################################################
resolver 169.254.169.254 valid=300s ipv6=off; # run "resolvectl status" to find primary DNS server.
resolver_timeout 5s;
#set $ords_upstream_host "<your-adb-fqdn>.adb.<region>.oraclecloudapps.com";
######################################################################################

location ~ ^/ords/(?<schema>[^/]+)/(?<module>[^/]+)/mcp$ {
    # Apply CORS headers for all methods
    more_set_headers "Access-Control-Allow-Origin: *";
    more_set_headers "Access-Control-Allow-Methods: GET, POST, DELETE, OPTIONS";
    more_set_headers "Access-Control-Allow-Headers: Content-Type, Authorization, mcp-protocol-version, mcp-session-id, Accept, Accept-Language";
    more_set_headers "Access-Control-Max-Age: 600";
    more_set_headers "Access-Control-Expose-Headers: Mcp-Session-Id, MCP-Protocol-Version";
    more_set_headers "MCP-Protocol-Version: $http_mcp_protocol_version";

    # OPTIONS preflight
    if ($request_method = OPTIONS) {
        add_header Content-Length 0 always;
        return 204;
    }

    # Workaround for BUG:38703879
    if ($request_method = DELETE) {
        add_header Content-Length 0 always;
        return 200;
    }

    # POST
    proxy_pass https://$ords_upstream_host/ords/$schema/$module/mcp;
    proxy_http_version 1.1;
    ###################################################
    # Change the value of the Host header to ADB.
    ###################################################
    proxy_set_header Origin "";
    proxy_ssl_server_name on;
    #proxy_set_header Host $host;
    proxy_set_header Host $ords_upstream_host;
    ###################################################
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Mcp-Session-Id $http_mcp_session_id;
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;
    add_header Cache-Control "no-store" always;

    # Intercept ORDS 401 Unauthorized.
    proxy_intercept_errors on;
    error_page 401 = @ords_401;
}